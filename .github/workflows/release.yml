name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get current version
        id: current
        run: |
          VERSION=$(jq -r '.version' .claude-plugin/plugin.json)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Check if tag exists
        id: check
        run: |
          VERSION="${{ steps.current.outputs.version }}"
          if git tag -l "v$VERSION" | grep -q "v$VERSION"; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Determine bump type from commits
        id: bump
        if: steps.check.outputs.exists == 'true'
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -z "$LAST_TAG" ]; then
            echo "type=patch" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          COMMITS=$(git log "$LAST_TAG"..HEAD --pretty=format:"%s")

          if echo "$COMMITS" | grep -qiE "^(BREAKING CHANGE|feat!|fix!)"; then
            echo "type=major" >> "$GITHUB_OUTPUT"
          elif echo "$COMMITS" | grep -qiE "^feat"; then
            echo "type=minor" >> "$GITHUB_OUTPUT"
          else
            echo "type=patch" >> "$GITHUB_OUTPUT"
          fi

      - name: Bump version
        id: next
        if: steps.check.outputs.exists == 'true'
        run: |
          VERSION="${{ steps.current.outputs.version }}"
          BUMP="${{ steps.bump.outputs.type }}"

          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"

          case "$BUMP" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac

          NEW_VERSION="$MAJOR.$MINOR.$PATCH"
          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"

          # Update plugin.json
          jq --arg v "$NEW_VERSION" '.version = $v' .claude-plugin/plugin.json > tmp.json
          mv tmp.json .claude-plugin/plugin.json

      - name: Commit version bump
        if: steps.check.outputs.exists == 'true'
        run: |
          NEW_VERSION="${{ steps.next.outputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .claude-plugin/plugin.json
          git commit -m "chore: bump version to $NEW_VERSION"
          git push

      - name: Resolve final version
        id: final
        run: |
          if [ "${{ steps.check.outputs.exists }}" = "true" ]; then
            echo "version=${{ steps.next.outputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${{ steps.current.outputs.version }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create tag and release
        run: |
          VERSION="${{ steps.final.outputs.version }}"
          git tag "v$VERSION"
          git push origin "v$VERSION"

          gh release create "v$VERSION" \
            --title "v$VERSION" \
            --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
